name: Notificação WhatsApp Automática

on:
  workflow_dispatch:

jobs:
  notify:
    name: Enviar cobranças do dia
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: whatsapp-bot/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: whatsapp-bot

      - name: Executar bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WA_API_KEY: ${{ secrets.WA_API_KEY }}
          WA_SESSION_ID: ${{ secrets.WA_SESSION_ID }}
        run: npm start
        working-directory: whatsapp-bot
